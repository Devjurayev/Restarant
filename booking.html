<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>


        <header>
        <a href="./index.html" class="logo"> Kafe<span>Milliy RESTAURANT</span></a>
        <ul class="nav-links">
            <li><a href="./index.html">Bosh sahifa</a></li>
            <li><a href="./index.html#sommelier ">Somelye</a></li>
            <li><a href="./index.html#menu">Menyu</a></li>
            <li><a href="./booking.html">Rezervatsiya</a></li>
            <!-- <li><a href="./admin.html" id="admin-gate-link"><i class="fa-solid fa-lock-open"></i> Tizim</a></li> -->
        </ul>
        <div class="header-right">
            <div class="cart-icon" id="cart-trigger">
                <i class="fa-solid fa-bag-shopping"></i>
                <span id="cart-count">0</span>
            </div>
            <a href="./booking.html" class="btn-book-nav">Joy band qilish</a>
        </div>
    </header>



    <section id="booking" style="padding: 60px 8%; background: #fff;">
    <div style="text-align: center; margin-bottom: 40px;">
        <h2 style="font-family: 'Playfair Display', serif; color: var(--luxury-red); font-size: 32px;">Stol band qilish</h2>
        <p style="color: #666;">Maxsus oqshom uchun oldindan joy band qiling</p>
    </div>

    <div style="max-width: 600px; margin: 0 auto; border: 2px solid var(--gold-bright); padding: 30px; border-radius: 15px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <input type="text" id="book-name" placeholder="Ismingiz" style="padding: 12px; border: 1px solid #ddd; border-radius: 5px;">
            <input type="tel" id="book-phone" 
                placeholder="+998 90-123-45-67" 
                onfocus="setInitialValue(this)"
                onblur="checkEmptyValue(this)"
                oninput="formatPhone(this)" 
                onkeydown="preventDeleteCountryCode(event, this)"
                style="padding: 12px; border: 1px solid #ddd; border-radius: 5px; width: 100%;">
            <input type="number" id="book-guests" placeholder="Odam soni" style="padding: 12px; border: 1px solid #ddd; border-radius: 5px;">
            <input type="datetime-local" id="book-date" style="padding: 12px; border: 1px solid #ddd; border-radius: 5px;">
        </div>
        <textarea id="book-comment" placeholder="Maxsus istaklar (masalan: deraza yonida bo'lsin)" style="width: 100%; margin-top: 20px; padding: 12px; height: 100px; border: 1px solid #ddd; border-radius: 5px;"></textarea>
        
        <button onclick="sendBookingToTelegram()" class="btn-checkout" style="margin-top: 20px;">
            Joyni band qilish
        </button>
    </div>
</section>

 <footer>
        <p>&copy; 2026 L'ÉLIXIR Luxury Restaurant Network. Barcha mualliflik huquqlari kafolatlangan. <a href="./index.html#footer" id="admin-gate-link"></i>Xavfsizlik</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
